<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 추가정보</title>

  <!-- base css 필수 삽입-->
  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/Typography.css" />
  <!-- 컨포넌트 css 선택-->
  <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />

  <link rel="stylesheet" href="/Oulim/asset/css/pages/user/signin/signup-info.css" />
  <script defer>
    fetch('/Oulim/header-login.html').then(r => r.text()).then(t => header.innerHTML = t)
    fetch('/Oulim/footer.html').then(r => r.text()).then(t => footer.innerHTML = t)
  </script>
  
</head>
<div id="header"></div>
<body>
  <form action="">
    <div class="p-signup-info">
      <div class="l-signup-info-layout">
        <div>
          <h2>회원가입</h2>
        </div>
        <div class="c-signup-info-text">
          <h4>가입하실 아이디와 비밀번호를 작성해 주세요.</h4>
        </div>
        <div>
          <h6>닉네임</h6>
          <div class="l-signup-info-input-layout">
            <div><input type="text" name="" id="" class="c-input" placeholder="닉네임 입력"></div>
            <div class="c-signup-btn"><button class="c-button c-button--secondary c-button--md">중복확인</button></div>
          </div>
        </div>
        <div>
          <h6>아이디</h6>
          <div class="l-signup-info-input-layout">
            <div><input type="text" name="" id="" class="c-input" placeholder="아이디 입력"></div>
            <div class="c-signup-btn"><button class="c-button c-button--secondary c-button--md">중복확인</button></div>
          </div>
        </div>
        <div class="c-signup-info-input-number">
          <h6>휴대전화번호</h6>
          <input type="password" name="" id="" class="c-input" placeholder="휴대전화번호을 입력해주세요">
        </div>
        <div class="c-signup-info-input-number">
          <h6>휴대전화번호</h6>
          <input type="password" name="" id="" class="c-input" placeholder="휴대전화번호을 입력해주세요">
        </div>
        <div class="c-signup-info-nextbtn"><button class="c-button c-button--primary c-button--md">회원가입</button></div>
      </div>

    </div>
  </form>
  
</body>
<div id="footer"></div>


</html>
