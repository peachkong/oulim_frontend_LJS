<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 본인인증</title>

  <!-- base css 필수 삽입-->
  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/Typography.css" />
  <!-- 컨포넌트 css 선택-->
  <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />


  <link rel="stylesheet" href="/Oulim/asset/css/pages/user/signin/signup-verify.css" />
  <script defer>
    fetch('/Oulim/header-login.html').then(r => r.text()).then(t => header.innerHTML = t)
    fetch('/Oulim/footer.html').then(r => r.text()).then(t => footer.innerHTML = t)
  </script>
  <div id="header"></div>
</head>

<body>
  <div class="p-signup-verify-main">
    <form action="">
      <div class="l-signup-verify-layout">
        <div>
          <h2>회원가입</h2>
        </div>

        <div class="c-signup-verify-text">
          <h4>가입자의 본인확인을 진행합니다</h4><br>
          <h6>인증된 기본정보로 가입을 진행합니다</h6>
        </div>

        <div class="c-signup-verify-input">
          <h6>이름</h6>
          <input type="text" name="" id="" class="c-input" placeholder="이름을 입력해주세요">
        </div>
        <div class="c-signup-verify-input">
          <h6>생년월일</h6>
          <input type="text" name="" id="" class="c-input" placeholder="생년월일을 입력해주세요">
        </div>
        <div class="c-signup-verify-input">
          <h6>이메일</h6>
          <input type="text" name="" id="" class="c-input" placeholder="이메일을 입력해주세요">
        </div>
        <div class="c-signup-verify-input">
          <h6>휴대전화번호</h6>
          <input type="text" name="" id="" class="c-input" placeholder="휴대전화번호을 입력해주세요">
        </div>
        <div class="c-signup-verify-input-number">
          <h6>인증번호</h6>
          <div class="l-signup-verify-number-layout">
            <div><input type="text" name="" id="" class="c-input" placeholder="인증번호입력"></div>
            <div class="c-signup-btn"><button class="c-button c-button--secondary c-button--md">인증확인</button></div>
          </div>
        </div>
        <div class="c-signup-verify-numbertime">3:00</div>
        <div class="c-signup-verify-nextbtn"><button class="c-button c-button--primary c-button--md">다 음</button></div>
      </div>

    </form>
  </div>
</body>
<div id="footer"></div>

</html>
