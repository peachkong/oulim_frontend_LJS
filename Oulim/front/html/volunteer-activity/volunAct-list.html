<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>봉사 활동</title>

  <!-- base css 필수 삽입-->
  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/typography.css" />
  <!-- 컨포넌트 css 선택-->
  <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />

  <script src="/Oulim/asset/assets/js/include.js"></script>
</head>
<script defer>
  fetch('/Oulim/header-login.html').then(r => r.text()).then(t => header.innerHTML = t)
  fetch('/Oulim/footer.html').then(r => r.text()).then(t => footer.innerHTML = t)
</script>
<div id="header"></div>

<body>
  <div class="l-main">
    <div class="l-container">
      <div class="p-volunAct-list-main">
        <div class="l-volunAct-title">
          <h2>봉사 활동</h2>
        </div>
        <!-- 봉사활동 조회 옵션 선택 그룹 -->
        <div class="l-volunAct-list-search-option-group">

        </div>
        <div class="l-volunAct-list-card-list">
          <!-- 봉사목록 카드 리스트 영역 -->
          <ul class="l-volunAct-card-list">
            <li class="l-volunAct-card-element">
              <!-- 카드 detail-card -->
              <div class="c-detail-card">
                <a href="">
                  <div class="c-detail-card__header">
                    <span class="c-badge c-badge--primary"> 모집중 </span>
                    <span class="c-badge c-badge--orange"> 독거노인 </span>
                  </div>
                  <h2 class="c-detail-card__title">주민과 함께하는 제설작업 봉사</h2>
                  <div class="c-detail-card__info">
                    <div class="c-detail-card__row">
                      <span class="c-detail-card__label"> 봉사장소 </span>
                      <span class="c-detail-card__value"> 서울특별시 도봉구 </span>
                    </div>
                    <div class="c-detail-card__row">
                      <span class="c-detail-card__label"> 봉사기간 </span>
                      <span class="c-detail-card__value"> 26.02.03 ~ 26.02.06 </span>
                    </div>
                    <div class="c-detail-card__row">
                      <span class="c-detail-card__label"> 봉사시간 </span>
                      <span class="c-detail-card__value"> 13 ~ 18 </span>
                    </div>
                    <div class="c-detail-card__row">
                      <span class="c-detail-card__label"> 포인트 </span>
                      <span class="c-detail-card__value"> 2000p </span>
                    </div>
                  </div>
                </a>
              </div>
            </li>
            <!-- detail card element 1개 영역 -->
          </ul>
          <!-- 봉사목록 카드 리스트 영역 종료-->
        </div>

        <div style="width: 900px; margin:50px;">
          <!-- 페이지네이션  c-pagination-->
          <nav class="c-pagination">
            <a class="c-pagination__link is-disabled">‹</a>
            <a class="c-pagination__link is-active">1</a>

            <a class="c-pagination__link">›</a>
          </nav>
        </div>

      </div>
    </div>
  </div>
</body>
<div id="footer"></div>

</html>
