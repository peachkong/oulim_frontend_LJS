<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>profile-edit</title>

  <!-- base css -->
  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/typography.css" />

  <!-- component css -->
  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />

  <link rel="stylesheet" href="/Oulim/asset/css/pages/mypage/profile/profile-edit.css">

  <script defer>
    fetch('/Oulim/header-login.html')
      .then(r => r.text())
      .then(t => document.getElementById('header').innerHTML = t)

    fetch('/Oulim/footer.html')
      .then(r => r.text())
      .then(t => document.getElementById('footer').innerHTML = t)
  </script>

  <script defer src="/Oulim/asset/js/pages/mypage/profile/profile-edit.js"></script>
</head>

<body>

  <div id="header"></div>`

  <main class="l-main">

    <div class="main-container">

      <!-- aside -->
      <div class="main-aside">
        <aside>
          <div class="main-aside-list">

            <h2>마이페이지</h2>

            <ul class="list1">
              <li>나의 정보</li>
              <br>
              <li>- 내 정보 보기</li>
              <br>
              <li>- 내 정보 수정</li>
              <br>
            </ul>

            <ul class="list2">
              <li>봉사조회</li>
              <br>
              <li>- 예정된 봉사 이력 조회</li>
              <br>
              <li>- 완료된 봉사 이력 조회</li>

            </ul>

            <ul class="list3">
              <li>포인트 조회</li>
            </ul>

            <ul class="list4">
              <li>작성글 조회</li>
            </ul>

            <ul class="list5">
              <li>회원 탈퇴</li>
            </ul>

          </div>
        </aside>
      </div>


      <!-- content -->
      <div class="main-2">

        <div class="main-text-box">
          <h1>나의 정보 수정</h1>
        </div>

        <form>

          <div class="main-pw">

            <h5>닉네임 수정</h5>
            <div class="pw-text">
              <input id="nickname" type="text" class="c-input" name="nickname" placeholder="기존 닉네임">
              <button type="button" class="c-button c-button--primary c-button--md">중복확인</button>
            </div>

            <h5>이메일 수정</h5>
            <div class="pw-text">
              <input id="email" type="text" class="c-input" name="email" placeholder="기존 이메일">
              <button class="c-button c-button--primary c-button--md">중복확인</button>
            </div>

            <h5>인증번호</h5>
            <div class="pw-text">
              <input id="verify" type="text" class="c-input" name="verify" placeholder="인증번호 입력">
              <button class="c-button c-button--primary c-button--md">인증확인</button>
            </div>

            <h5>비밀번호 수정</h5>
            <div class="pw-text">
              <input type="password" class="c-input" name="new-password" placeholder="새 비밀번호 입력">
            </div>

            <h5>비밀번호 재확인</h5>
            <div class="pw-text">
              <input type="password" class="c-input" name="new-password-check" placeholder="비밀번호 확인">
            </div>

            <h5>주소</h5>
            <div class="pw-text">
              <input type="text" class="c-input" name="address" placeholder="주소 추가하기">
              <button class="c-button c-button--primary c-button--md">주소검색</button>
            </div>

          </div>

          <div class="c-button-group">
            <button id="accept" class="c-button c-button--primary c-button--md">수정</button>
            <button id="cancel" class="c-button c-button--secondary c-button--md">취소</button>
          </div>

        </form>

      </div>

    </div>

  </main>

  <div id="footer"></div>

</body>

</html>
