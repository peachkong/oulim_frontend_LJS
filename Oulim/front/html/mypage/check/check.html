<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>check</title>

    <!-- base css 필수 삽입-->
    <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/typography.css" />

    <!-- 컨포넌트 css 선택-->
    <!-- <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" /> -->
    <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
    <!-- <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" /> -->
    <!-- <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" /> -->
    <!-- <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" /> -->
    <!-- <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" /> -->

    <!-- <script src="/Oulim/asset//assets/js/include.js"></script> -->

    <link
      rel="stylesheet"
      href="./../../../../asset/css/pages/mypage/check/check.css"
    />
  </head>

  <body>
    <!-- Header 자동 삽입 -->
    <!-- <%@ include file="header.jsp" %> -->
    <header>header</header>

    <main class="l-main">
      <!-- 팀원들 작성 영역 이 안에서 작업하기!!퍼블 작업진행 -->
      <div class="main-container"> <!-- 메인 컨테이너 시작 -->
        <div class="main-aside"> <!-- aside 리스트 대분류 컨테이너 시작 -->
          <aside>
            <div class="main-aside-list"> <!-- aside 리스트 중분류 컨테이너 시작 -->
              <ul>
                <h2>마이페이지</h2>
                <div class="list1"> <!-- 나의 정보 리스트 컨테이너 시작 -->
                  <li>나의 정보</li>
                  <br />
                  <li>- 내 정보 보기</li>
                  <br />
                  <li>- 내 정보 수정</li>
                </div> <!-- 나의 정보 리스트 컨테이너 끝 -->
                <div class="list2"> <!-- 봉사 조회 리스트 컨테이너 시작 -->
                  <li>봉사조회</li>
                  <br />
                  <li>- 예정된 봉사 이력 조회</li>
                  <br />
                  <li>- 완료된 봉사 이력 조회</li>
                </div> <!-- 봉사 조회 리스트 컨테이너 끝 -->
                <div class="list3"> <!-- 포인트 조회 리스트 컨테이너 시작 -->
                  <li>포인트 조회</li>
                </div> <!-- 포인트 조회 리스트 컨테이너 끝 -->
                <div class="list4"> <!-- 작성글 조회 리스트 컨테이너 시작 -->
                  <li>작성글 조회</li>
                </div> <!-- 작성글 조회 리스트 컨테이너 끝 -->
                <div class="list5"> <!-- 회원 탈퇴 리스트 컨테이너 끝 -->
                  <li>회원 탈퇴</li>
                </div> <!-- 회원 탈퇴 리스트 컨테이너 끝 -->
              </ul>
            </div> <!-- aside 리스트 중분류 컨테이너 끝 -->
          </aside>
        </div> <!-- aside 리스트 컨테이너 끝 -->

        <div class="main-2"> <!-- main 오른쪽 구역 컨테이너 시작 -->
          <div class="main-text-box"> <!-- main 상단 제목 대분류 컨테이너 시작 -->
            <div class="m2-text-box-1"> <!-- main 상단 제목 중분류 컨테이너1 시작 -->
              <h1>마이페이지</h1>
            </div> <!-- main 상단 제목 컨테이너1 끝 -->

            <div class="m2-text-box-2"> <!-- main 상단 제목 컨테이너2 시작 -->
              <h5>마이페이지는 비밀번호 확인 후 이용가능합니다</h5>
            </div> <!-- main 상단 제목 중분류 컨테이너2 끝 -->
          </div> <!-- main 상단 제목 대분류 컨테이너 끝 -->

          <form action="">
            <div class="main-pw"> <!-- main 비밀번호 입력 구역 컨테이너 시작 -->
              <div class="pw-text"> <!-- main 비밀번호 입력 text 컨테이너 시작 -->
                <h5>비밀번호</h5>
              </div> <!-- main 비밀번호 입력 text 컨테이너 끝 -->
              <div class="pw-input"> <!-- main 비밀번호 입력 text 컨테이너 끝 -->
                <input
                  type="password"
                  class="c-input"
                  name="password"
                  placeholder="비밀번호 입력"
                />
              </div> <!-- main 비밀번호 입력 text 컨테이너 끝 -->
            </div> <!-- main 비밀번호 입력 구역 컨테이너 시작 끝 -->

            <div class="c-button-group"> <!-- 버튼 공용 컴포넌트 컨테이너 시작 -->
              <button
                class="c-button c-button--primary c-button--md"
                style="width: 120px"
                margin="0 20px"
                ;
              >
                저장
              </button>
              <button
                class="c-button c-button--secondary c-button--md"
                style="width: 120px"
              >
                취소
              </button>
            </div> <!-- 버튼 공용 컴포넌트 컨테이너 끝 -->
          </form>
        </div> <!-- main 오른쪽 구역 컨테이너 끝 -->
      </div> <!-- 메인 컨테이너 끝 -->
    </main>
    <footer>footer</footer>
    <!-- Footer 자동 삽입 -->
    <!-- <%@ include file="footer.jsp" %> -->
  </body>
</html>
