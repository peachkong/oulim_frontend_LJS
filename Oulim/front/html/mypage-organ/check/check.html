<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>check</title>

  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/typography.css" />

  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />

  <link rel="stylesheet" href="/Oulim/asset/css/pages/mypage-organ/check/check.css">

  <script defer src="/Oulim/asset/js/pages/main/include.js"></script>

  <script defer src="/Oulim/asset/js/pages/mypage-organ/check/check.js"></script>
</head>

<body>

  <div id="header"></div>

  <main class="l-main">

    <div class="l-mypage">

      <div class="l-mypage--aside">
        <aside>
          <div class="p-mypage-check--menu">
            <ul>
              <h2>마이페이지</h2>

              <div class="p-mypage-check--menu-group">
                
                
               
                <br />
                <a href="/Oulim/front/html/mypage/check/check.html"><li>내 정보 수정</li></a>
              </div>

        

              <div class="p-mypage-check--menu-group">
                <li>회원 탈퇴</li>
              </div>

            </ul>
          </div>
        </aside>
      </div>

      <div class="l-mypage--content">

        <div class="p-mypage-check--header">

          <div class="p-mypage-check--title">
            <h1>마이페이지</h1>
          </div>

          <div class="p-mypage-check--desc">
            <h5>마이페이지는 비밀번호 확인 후 이용가능합니다</h5>
          </div>

        </div>

        <form>

          <div class="p-mypage-check--form">

            <div class="p-mypage-check--label">
              <h5>비밀번호</h5>
            </div>

            <div class="p-mypage-check--input">
              <input type="password" class="c-input" name="password" placeholder="비밀번호 입력" />
             <button type="button" id="c-password-btn-toggle"><img src="/Oulim/asset/image/user/password-off.png" alt="eye" id="c-password-toggle-img" /></button>
            </div>

          </div>

          <div class="c-button-group">
            <button id="accept" class="c-button c-button--primary c-button--md" style="width:120px">
              확인
            </button>

            <button id="cancel" class="c-button c-button--secondary c-button--md" style="width:120px">
              취소
            </button>
          </div>

        </form>

      </div>

    </div>

  </main>

  <div id="footer"></div>

</body>

</html>
