<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>봉사 후기</title>

    <!-- base css 필수 삽입-->
    <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/typography.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/layout.css" />
    <!-- 컨포넌트 css 선택-->
    <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />
    <!-- css 연결 -->
    <link
      rel="stylesheet"
      href="/Oulim/asset/css/pages/community/community-detail.css"
    />
    <script defer src="/Oulim/asset/js/pages/main/include.js"></script>
    <script
      defer
      src="/Oulim/asset/js/pages/community/community-detail.js"
    ></script>
  </head>
  <script defer>
    fetch("/Oulim/header-login.html")
      .then((r) => r.text())
      .then((t) => (header.innerHTML = t));
    fetch("/Oulim/footer.html")
      .then((r) => r.text())
      .then((t) => (footer.innerHTML = t));
  </script>
  <div id="header"></div>

  <body>
    <!-- Header 자동 삽입 -->
    <!-- <%@ include file="header.jsp" %> -->

    <main class="l-main">
      <div class="l-container">
        <!-- 팀원들 작성 영역 이 안에서 작업하기!!퍼블 작업진행 -->
        <div class="p-community-detail">
          <div class=""><b>제목</b></div>
          <div class="l-community-detail-author-group">
            작성자 | <span id="author">작성자</span> 작성일 |
            <span id="date">작설일</span> 추천수 |
            <span id="like">추천수</span> 조회수 | <span id="view">조회수</span>
          </div>
        </div>
        <div class="l-community-detail-main">
          <div>
            <h4>상세내용</h4>
          </div>
          <!-- 추후 이미지를 출력할 div -->
          <div class="l-community-detail-image"></div>
          <!-- 전달 받은 데이터를 표시할 div -->
          <div class="l-community-detail-main-content">내용출력</div>
        </div>

        <div class="l-community-comment">
          <div class="l-community-comment-recommend-btn-group">
            <div class="c-comment-title"><b>댓글</b></div>
            <div class="l-recommend-btn-group">
              <button class="c-button--primary">추천</button>
              <div class="c-recommend">추천수 | 40000</div>
            </div>
          </div>
          <div class="comment-item">
            작성자<span id="comment-author"></span><br />
            <div class="comment-content">댓글내용</div>
          </div>
          <div class="l-community-comment-writebox">
            <textarea
              class="c-comment-textarea"
              placeholder="댓글 입력"
            ></textarea>
            <div class="c-comment-post-btn">
              <button class="c-button--primary">댓글 작성</button>
            </div>
          </div>
        </div>

        <div class="l-return-button">
          <button class="c-button c-button--primary">목록으로 돌아가기</button>
        </div>
      </div>
    </main>

    <!-- Footer 자동 삽입 -->
    <!-- <%@ include file="footer.jsp" %> -->
  </body>
  <div id="footer"></div>
</html>
