<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>

    <!-- base css 필수 삽입-->
    <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/Typography.css" />
    <!-- 컨포넌트 css 선택-->
    <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />

    <link rel="stylesheet" href="login.css" />
    <!-- <script src="/Oulim/asset/assets/js/include.js"></script> -->
  </head>

  <body>
    <!-- Header 자동 삽입 -->
    <!-- <%@ include file="header.jsp" %> -->

    <main class="l-main">
      <!-- <div class="login"> -->
      <div class="l-login-layout">
        <h1>어울림에<br> 오신것을 환영합니다.</h1>
        <form action="" method="POST">
          
          <!-- 아이디입력 -->
          <div class="l-login-input-layout">
            <label for="userName">아이디</label>
            <input id="userName" class="c-input" name="userName" placeholder="사번 또는 이메일을 입력하세요">
          </div>
          <!-- 비밀번호입력 -->
          <div class="l-login-input-layout">
            <label for="userPw">비밀번호</label>
            <div class="pw-box-layout">
              <input id="userPw" type="password" class="c-input" name="userPw" placeholder="비밀번호를 입력하세요">
              <div><span class="pw-box">눈</span></div>
            </div>
            <div id="is-user-login-error" class="is-error-text"><span></span></div>
          </div>
          
          <!-- 로그인 버튼 -->
          <button class="c-button c-button--primary c-button--md">로그인</button>
        </form>
        <div class="login-help">로그인 관련 문의는 admin@leadpop.co.kr로 연락해 주세요.</div>
      </div>
    </main>

    <!-- Footer 자동 삽입 -->
    <!-- <%@ include file="footer.jsp" %> -->
  </body>
</html>
