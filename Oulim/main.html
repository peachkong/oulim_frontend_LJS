<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>

    <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
    <link rel="stylesheet" href="/Oulim/asset/css/core/layout.css" />

    <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css">
    <link rel="stylesheet" href="/Oulim/asset/css/pages/main/main.css">
    
    <script defer src="/Oulim/asset/js/pages/main/include.js"></script>
    <script defer src="/Oulim/asset/js/pages/main/main.js"></script>
</head>
<body>
    <div id="header"></div>

    <main class="l-main">

        <section class="p-main-visual">
            <div class="l-container">

                <div class="visual-card">
                    <div class="visual-text">
                        <div class="visual-badge">LV.1 꼬미와 첫걸음 🐾</div>
                        <h1 class="visual-title">작은 선행이 모여<br>우리 <span class="highlight">꼬미</span>를 변화시켜요!</h1>
                        <p class="visual-desc">봉사활동은 어렵지 않아요. 지금 바로 시작하고<br>세상을 따뜻하게 만드는 도력을 쌓아보세요!</p>
                        <div class="visual-btns">
                            <a href="#" class="c-button c-button--primary c-button--sm">봉사활동 찾기</a>
                            <a href="#" class="c-button c-button--Tertiary c-button--sm">미션 확인</a>
                        </div>
                    </div>
                    <div class="visual-char">
                        <img src="/Oulim/asset/image/character/komi-lv1.svg" alt="꼬미" class="komi-main-img">
                    </div>
                </div>

            </div>
        </section>

        <section class="p-main-section">
            <div class="l-container">

                <div class="section-header">
                    <div class="header-group">
                        <h2 class="section-title">따끈따끈한 봉사 소식</h2>
                        <p class="section-subtitle">새로운 봉사자들이 기다리고 있어요!</p>
                    </div>
                    <a href="#" class="c-button c-button--secondary c-button--sm">더 보러가기 &gt;</a>
                </div>
                
                <div class="slider-container">
                    <button class="slider-arrow prev" id="prevBtn"> &lt;</button>
                    <div class="slider-viewport">
                        <div class="slider-track js-volunteer-slider">
                        </div>
                    </div>
                    <button class="slider-arrow next" id="nextBtn">&gt;</button>
                </div>
            </div>
        </section>

        <section class="p-main-section">
            <div class="l-container">
                <div class="section-header">
                    <div class="header-group">
                        <h2 class="section-title">따뜻한 마음의 기록</h2>
                        <p class="section-subtitle">수행자들이 직접 남긴 생생한 후기</p>
                    </div>
                    <a href="#" class="c-button c-button--secondary c-button--sm">더 보러가기 &gt;</a>
                </div>
                <div class="review-grid js-review-container">
                    </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
</body>
</html>
